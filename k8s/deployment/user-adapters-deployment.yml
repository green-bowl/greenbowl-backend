apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-adapters
  namespace: greenbowl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-adapters
  template:
    metadata:
      labels:
        app: user-adapters
    spec:
      containers:
        - name: user-adapters
          image: hellmir/greenbowl-user-adapters:1.0.0
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.greenbowl.svc.cluster.local:5432/greenbowl"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgresuser"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
