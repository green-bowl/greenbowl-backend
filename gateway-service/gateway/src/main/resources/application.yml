server:
  port: 8000
spring:
  application:
    name: gateway
  main:
    allow-bean-definition-overriding: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Seoul
    serialization:
      fail-on-empty-beans: false
  cloud:
    gateway:
      routes:
        - id: recommendation-adapters
          uri: lb://RECOMMENDATION-ADAPTERS
          predicates:
            - Path=/api/recommendations/**
          filters:
            - name: AuthorizationHeaderFilter
            - RewritePath=/api/recommendations/(?<segment>.*), /${segment}

        - id: fridge-adapters
          uri: lb://FRIDGE-ADAPTERS
          predicates:
            - Path=/api/fridges/**
          filters:
            - name: AuthorizationHeaderFilter
            - RewritePath=/api/fridges/(?<segment>.*), /${segment}

        - id: recipe-adapters
          uri: lb://RECIPE-ADAPTERS
          predicates:
            - Path=/api/recipes/**
          filters:
            - name: AuthorizationHeaderFilter
            - RewritePath=/api/recipes/(?<segment>.*), /${segment}

        - id: user-adapters
          uri: lb://USER-ADAPTERS
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}
  jwt:
    secret: ${GREENBOWL_JWT_SECRET_KEY}
eureka:
  client:
    enabled: false
logging:
  config: classpath:logback-spring.xml
