server:
  port: 8000
spring:
  application:
    name: gateway
  main:
    allow-bean-definition-overriding: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Seoul
    serialization:
      fail-on-empty-beans: false
  cloud:
    gateway:
      routes:
#        - id: recommendation-adapters
#          uri: lb://RECOMMENDATION-ADAPTERS
#          predicates:
#            - Path=

        - id: fridge-adapters
          uri: lb://FRIDGE-ADAPTERS
          predicates:
            - Path=/category-items/**,/ingredients/**
          filters:
            - name: AuthorizationHeaderFilter

#        - id: recipe-adapters
#          uri: lb://RECIPE-ADAPTERS
#          predicates:
#            - Path=

#        - id: user-adapters
#          uri: lb://USER-ADAPTERS
#          predicates:
#            - Path=
eureka:
  client:
    enabled: false
logging:
  config: classpath:logback-spring.xml
